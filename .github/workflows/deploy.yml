name: Verify

# CI gate. Runs the full local gate suite (check + unit tests + headless
# smoke + Playwright e2e) on every push to main AND on every pull request
# (forward-pass M20/M21 — a red tree must not reach production).
#
# DEPLOY is handled by Cloudflare Workers, NOT here. `wrangler.jsonc`
# serves dist/ as static assets at https://naklidata.naklitechie.com/ ;
# Cloudflare's Git integration (Workers Builds) auto-deploys on push to
# main. The old GitHub Pages build/deploy jobs were retired 2026-06-11
# once Cloudflare became the canonical deploy (the github.io URL is no
# longer advertised). To fully decommission Pages, also flip
# Settings → Pages → Source to "None" in the repo settings (dashboard-only
# step; the last Pages deploy otherwise stays frozen-but-live).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Scope concurrency to the ref so a new push to main cancels an older
# in-flight main run (latest commit wins); PR runs and main runs stay in
# separate groups.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # The `postinstall` script downloads the DuckDB-wasm fallback
        # (~75 MB) and the vendored extensions; both end up in public/.
        # The smoke + e2e specs boot with ?offline=1 against those bytes.
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        # Build first so the bundle-size gate inside `npm run check` has a
        # dist/ to measure (check-bundle-size.mjs is a no-op when dist/ is
        # absent). The smoke + e2e steps rebuild — esbuild is ~1s, so the
        # redundant builds are negligible.
        run: npm run build

      - name: Check (tsc + biome + engine-boundary + bundle-size)
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Smoke (headless build + browser)
        run: npm run smoke

      - name: E2e (Playwright, 55 specs, offline path)
        # Reuses the Chromium installed above. The specs serve dist/ via
        # their own static server with ?offline=1, so no CDN dependency.
        # 2 workers matches the config default (ubuntu-latest has 2 cores;
        # >2 hammering the DuckDB-wasm boot causes engine-boot timeouts).
        run: npm run test:e2e
